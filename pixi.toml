[workspace]
authors = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "sqlite"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
preview = ["pixi-build"]

[package]
name = "sqlite"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }

[dependencies]
mojo = "==0.26.3.0.dev2026041305"
morph = { git = "https://github.com/ehsanmok/morph.git", branch = "main" }
sqlite = ">=3.45"

[feature.dev.dependencies]
pre-commit = ">=4.2.0,<5"
mojodoc = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }
mozz = { git = "https://github.com/ehsanmok/mozz.git", branch = "main" }

[activation]
env = { MOJO_FLAGS = "-I ." }

[environments]
default = { features = ["dev"], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }

[tasks]
# Format
install-pre-commit = "pre-commit install"
format = { cmd = "mojo format sqlite tests examples benchmark", depends-on = ["install-pre-commit"] }
format-check = "mojo format --check sqlite tests examples benchmark"

# Tests
tests     = "mojo $MOJO_FLAGS tests/test_db.mojo && mojo $MOJO_FLAGS tests/test_orm.mojo"
test-db   = "mojo $MOJO_FLAGS tests/test_db.mojo"
test-orm  = "mojo $MOJO_FLAGS tests/test_orm.mojo"
test-fuzz = "mojo $MOJO_FLAGS tests/test_fuzz.mojo"

# Examples (run individually or all at once)
example-01 = "mojo $MOJO_FLAGS examples/01_hello_sqlite.mojo"
example-02 = "mojo $MOJO_FLAGS examples/02_prepared_statements.mojo"
example-03 = "mojo $MOJO_FLAGS examples/03_all_types.mojo"
example-04 = "mojo $MOJO_FLAGS examples/04_orm_basics.mojo"
example-05 = "mojo $MOJO_FLAGS examples/05_orm_optional.mojo"
example-06 = "mojo $MOJO_FLAGS examples/06_contacts_app.mojo"
example-07 = "mojo $MOJO_FLAGS examples/07_transactions.mojo"
examples   = { depends-on = ["example-01", "example-02", "example-03", "example-04", "example-05", "example-06", "example-07"] }

# Benchmark
bench = "mojo $MOJO_FLAGS benchmark/bench.mojo"

# Docs
docs       = "mojodoc ./sqlite --open"
docs-build = "mojodoc ./sqlite --out-dir target/doc --base-url /sqlite/"
