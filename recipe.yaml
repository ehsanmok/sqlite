package:
  name: sqlite
  version: "0.1.1"

source:
  path: .

build:
  script:
    - mkdir -p $PREFIX/lib/mojo
    - cp -r sqlite $PREFIX/lib/mojo/

requirements:
  host:
    - mojo ==1.0.0b1
  run:
    - mojo ==1.0.0b1

about:
  summary: SQLite bindings with morph ORM integration for Mojo
  license: MIT
